name: 블로그 글 목록 자동 갱신

on:
  schedule:
    - cron: "0 21 * * *"   # 매일 06:00 KST
  workflow_dispatch:        # GitHub Actions 탭에서 수동 실행 가능

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 블로그 글 수집
        run: python update_posts.py

      - name: 변경 시 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet posts.js; then
            git add posts.js
            git commit -m "글 목록 자동 갱신 ($(date +%Y-%m-%d))"
            git push
          else
            echo "변경 없음"
          fi
